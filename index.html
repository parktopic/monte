<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>당근 몬테소리지!</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
<style>
  @import url('https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  :root{
    --bg:#f7f6f3; --card:#fff; --ink:#26231e; --sub:#8e887d; --line:#eeeae3;
    --g1:#ff7e36; --g2:#ff9d4d; --grad:linear-gradient(135deg,#ff7e36,#ff9d4d);
    --carrot:#ff7e36; --carrot-d:#ec5e1a; --leaf:#3aa856;
    --r1:#1f9d4d; --r2:#6fae2e; --r3:#e8a417; --r4:#ef6a26; --r5:#dc3023;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:#eceae5;color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.3px}
  .phone{max-width:480px;margin:0 auto;height:100vh;height:100svh;height:100dvh;background:var(--bg);position:relative;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 0 40px #0000001a}
  /* top bar */
  .topbar{padding:calc(env(safe-area-inset-top,0px) + 13px) 18px 13px;display:flex;align-items:center;gap:11px;
    background:#fff;border-bottom:1px solid var(--line);z-index:5}
  .topbar .mascot{width:40px;height:40px;flex:none}
  .topbar .logo{font-size:20px;font-weight:900;letter-spacing:-.6px;color:var(--carrot)}
  .topbar .sub{font-size:11.5px;color:var(--sub);margin-top:2px;font-weight:600}
  .topbar .io{margin-left:auto;display:flex;gap:6px}
  .iobtn{height:34px;padding:0 12px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub)}
  .iobtn:active{background:#f7f6f3}
  /* content */
  .content{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}
  .view{display:none;min-height:100%}
  .view.on{display:block}
  /* day filter */
  .dayfilter{display:flex;gap:7px;padding:12px 16px 8px;overflow-x:auto;scrollbar-width:none;background:var(--bg);position:sticky;top:0;z-index:4}
  .dayfilter::-webkit-scrollbar{display:none}
  .dchip{flex:none;border:none;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:8px 16px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s}
  .dchip.on{background:var(--carrot);color:#fff;border-color:var(--carrot)}
  /* MAP */
  .axtoplabel,.axbotlabel{text-align:center;font-size:11.5px;font-weight:800;color:var(--leaf)}
  .axtoplabel{margin:6px 0 2px}
  .axbotlabel{margin:2px 0 0;color:#cf9a3a}
  .mapband{display:flex;align-items:stretch;gap:4px;padding:0 6px}
  .bandside{flex:none;width:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;line-height:1.25;text-align:center}
  .bandside.left{color:#dc3023}
  .bandside.right{color:#1f9d4d}
  #mapPlane{position:relative;flex:1;border-radius:22px;background:
    linear-gradient(135deg,#fdeeee 0%,#fff 40%,#fff 60%,#eef7ee 100%);
    border:1px solid var(--line);overflow:hidden;box-shadow:0 4px 18px #0000000a}
  .qlab{position:absolute;font-size:10px;font-weight:800;z-index:1;pointer-events:none;opacity:.85;line-height:1.2}
  .midline{position:absolute;left:8%;right:8%;top:50%;border-top:1px dashed #e7e7ea;z-index:0}
  .midlineV{position:absolute;top:8%;bottom:8%;left:50%;border-left:1px dashed #e7e7ea;z-index:0}
  #mapInner{position:absolute;inset:0;transform-origin:0 0;will-change:transform}
  .avatar{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2}
  .avatar:active .ava-circle{filter:brightness(1.08)}
  .ava-name{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;z-index:50;pointer-events:none}
  .zoombtns{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px;z-index:3}
  .zoombtns button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#ffffffe6;font-size:18px;font-weight:700;color:#5a5e66;cursor:pointer;box-shadow:0 2px 6px #0001;display:flex;align-items:center;justify-content:center}
  .zoombtns button:active{background:#f0f0f2}
  .ava-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;
    box-shadow:0 3px 10px #0003;border:2.5px solid #fff;position:relative}
  .ava-circle svg{display:block}
  .ava-circle .cnt{position:absolute;top:-3px;right:-3px;background:var(--carrot-d);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;padding:0 3px;z-index:2}
  .ava-name{font-size:11px;font-weight:800;background:#ffffffec;padding:1px 7px;border-radius:7px;color:#3a3d44;letter-spacing:-.3px;box-shadow:0 1px 3px #0001}
  .maptiny{text-align:center;font-size:10.5px;color:#b6b9c0;padding:0 16px 14px}
  /* LIST */
  .listwrap{padding:6px 14px 24px}
  .srow{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.12s}
  .srow:active{transform:scale(.985);background:#fafafa}
  .srow .nm{font-weight:800;font-size:15.5px}
  .srow .mt{font-size:11.5px;color:var(--sub);margin-top:2px}
  .srow .right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .srow .badge{font-size:11px;font-weight:800;color:var(--carrot);background:#fff0e6;border-radius:99px;padding:3px 9px}
  .srow .chev{color:#c9ccd2;font-size:18px}
  .warn-dot{width:7px;height:7px;border-radius:50%;background:var(--r5);display:inline-block;margin-left:5px}
  /* bottom nav */
  .bnav{display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:var(--safe-b);z-index:6}
  .bnav button{flex:1;border:none;background:none;padding:10px 0 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#b6b9c0;font-size:10.5px;font-weight:700}
  .bnav button.on{color:var(--carrot)}
  .bnav svg{width:24px;height:24px}
  /* detail (full screen sheet) */
  .sheet{position:absolute;inset:0;background:var(--bg);z-index:20;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .sheet.on{transform:translateX(0)}
  .dhead{background:#fff;padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 14px;border-bottom:1px solid var(--line)}
  .dtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .backbtn{border:none;background:none;font-size:24px;cursor:pointer;color:var(--ink);padding:0 6px 0 0;line-height:1}
  .recbtn{border:none;background:var(--grad);color:#fff;font-size:14px;font-weight:800;padding:9px 18px;border-radius:12px;cursor:pointer;box-shadow:0 3px 10px #ff7e3655}
  .recbtn:active{transform:scale(.95)}
  .dprofile{display:flex;align-items:center;gap:13px}
  .infofold{border:1px solid var(--line);border-radius:12px;margin-top:12px;background:#faf8f4;padding:0 13px}
  .infofold>summary{padding:11px 0;font-size:12.5px;font-weight:700;color:var(--sub);list-style:none;display:flex;align-items:center}
  .infofold>summary::-webkit-details-marker{display:none}
  .infofold>summary::after{content:"⌄";margin-left:auto;font-size:15px}
  .infofold[open]>summary::after{content:"⌃"}
  .infofold .inforows{margin:0 0 12px;background:none;border:none;padding:0}
  .dnamewrap{flex:1}
  .dname{font-size:21px;font-weight:800;display:flex;align-items:baseline;gap:8px}
  .dage{font-size:14px;font-weight:700;color:var(--carrot);background:#fff0e6;padding:2px 9px;border-radius:99px}
  .danimal{font-size:12.5px;color:var(--carrot-d);margin-top:4px;font-weight:700}
  .dgroup{font-size:12px;color:var(--sub);margin-top:3px;font-weight:600}
  .inforows{margin-top:14px;background:#faf8f4;border:1px solid var(--line);border-radius:14px;padding:4px 14px}
  .irow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid #efece5}
  .irow:last-child{border-bottom:none}
  .irow .ik{width:64px;flex:none;font-size:12px;color:var(--sub);font-weight:700}
  .irow .iv{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.4}
  .nm .age{font-size:11.5px;font-weight:700;color:var(--carrot);background:#fff0e6;padding:1px 7px;border-radius:99px;margin-left:2px}
  .tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:#f1f1f3;color:#73777e}
  .tag.warn{background:#ffece9;color:var(--r5)}
  .star{margin-top:10px;background:#fff4ea;border:1px solid #f5d9bd;border-radius:14px;padding:11px 13px;font-size:12.5px;color:#a8642a;line-height:1.55}
  .dbody{flex:1;overflow-y:auto;padding:16px 14px 120px;-webkit-overflow-scrolling:touch}
  .secttl{font-size:13px;font-weight:800;margin:4px 2px 11px;color:var(--ink)}
  /* progress */
  .progcard{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px 16px 6px;margin-bottom:18px}
  .aprog{margin-bottom:13px}
  .aprog .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .aprog .a{font-weight:800}.aprog .v{color:var(--sub);font-weight:700;font-size:11.5px}
  .ptrack{height:8px;background:#f0f0f2;border-radius:99px;overflow:hidden}
  .pfill{height:100%;border-radius:99px;transition:width .5s ease}
  .emptybox{color:var(--sub);font-size:13px;padding:22px 16px;background:#fff;border:1px solid var(--line);border-radius:18px;text-align:center;line-height:1.6}
  .emptybox .mini-carrot{font-size:34px;display:block;margin-bottom:8px}
  /* feed */
  .post{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px 15px;margin-bottom:13px}
  .post .ph{display:flex;align-items:center;gap:9px}
  .areadot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
  .post .pa{font-weight:800;font-size:11px;color:#fff;padding:3px 9px;border-radius:8px}
  .post .pact{font-weight:800;font-size:15px;margin-top:1px}
  .post .pdate{margin-left:auto;font-size:11px;color:var(--sub);font-weight:600}
  .post .pmenu{border:none;background:none;color:#c4c7cd;font-size:18px;cursor:pointer;padding:0 2px}
  .prate{display:flex;gap:18px;margin-top:11px}
  .prate .lab{font-size:11px;color:var(--sub);font-weight:700;margin-bottom:4px}
  .pips{display:flex;gap:3px}
  .pip{width:14px;height:7px;border-radius:99px;background:#ededf0}
  .pips .txt{font-size:11.5px;font-weight:800;margin-left:5px}
  .pbox{margin-top:11px;border-radius:12px;padding:9px 12px;font-size:13px;line-height:1.55}
  .pbox.next{background:#eef6ee;color:#3a6349}
  .pbox.note{background:#faf8f4;color:#3c3f45}
  .pbox .bl{font-size:10px;font-weight:800;letter-spacing:.3px;opacity:.7;display:block;margin-bottom:3px}
  /* FAB */
  .fab{position:absolute;right:18px;bottom:calc(20px + var(--safe-b));width:60px;height:60px;border-radius:20px;border:none;
    background:var(--grad);color:#fff;font-size:30px;font-weight:300;cursor:pointer;box-shadow:0 8px 22px #ff7e3666;z-index:25;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.92)}
  /* record bottom sheet */
  .rsheet{position:absolute;left:0;right:0;bottom:0;top:max(env(safe-area-inset-top,0px),24px);background:#fff;z-index:40;border-radius:26px 26px 0 0;
    transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:0 -10px 40px #0003}
  .rsheet.on{transform:translateY(0)}
  .rhandle{width:40px;height:5px;border-radius:99px;background:#e2e2e6;margin:10px auto 4px}
  .rhead{padding:6px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .rhead .t{font-size:17px;font-weight:800}
  .rhead .x{margin-left:auto;border:none;background:#f1f1f3;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--sub)}
  .rbody{flex:1;overflow-y:auto;padding:16px 18px 24px;-webkit-overflow-scrolling:touch}
  .rstep{margin-bottom:20px}
  .rstep .lab{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .rstep .n{width:19px;height:19px;border-radius:50%;background:var(--grad);color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
  .rstep .opt{color:var(--sub);font-weight:600;font-size:11px}
  .arearow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px}
  .arearow::-webkit-scrollbar{display:none}
  .areapill{flex:none;border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:10px 16px;font-size:13.5px;font-weight:800;color:var(--sub);cursor:pointer}
  .areapill.on{color:#fff;border-color:transparent}
  .actwrap{display:flex;flex-wrap:wrap;gap:8px}
  .actpill{border:1px solid var(--line);background:#fff;border-radius:99px;padding:9px 15px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
  .actpill.on{background:var(--carrot);color:#fff;border-color:var(--carrot)}
  .actadd{border:1px dashed #ffc89e;background:#fff7f0;border-radius:99px;padding:9px 15px;font-size:13px;font-weight:700;color:var(--carrot);cursor:pointer}
  .actpill.suggest{border:1px dashed var(--line);background:#fafafa;color:var(--carrot);font-weight:700}
  .notegrp{margin-bottom:11px}
  .ngl{font-size:11px;font-weight:800;margin-bottom:6px}
  .ngl.pos{color:#1f9d4d}.ngl.mid{color:#8e887d}.ngl.neg{color:#cf7a1e}
  .actpill.notechip.pos.on{background:#1f9d4d;color:#fff;border-color:#1f9d4d}
  .actpill.notechip.mid.on{background:#8e887d;color:#fff;border-color:#8e887d}
  .actpill.notechip.neg.on{background:#ef8b42;color:#fff;border-color:#ef8b42}
  .pstep{font-size:12.5px;font-weight:600;color:var(--sub)}
  .goalbox{margin-top:11px;background:#f3f8f4;border:1px solid #d6e8da;border-radius:12px;padding:11px 13px}
  .goalbox .goaltxt{font-size:12.5px;color:#3a6349;font-weight:700;line-height:1.5}
  .goalbox .fit{display:inline-block;margin-top:7px;font-size:11px;font-weight:800;padding:3px 9px;border-radius:99px}
  .goalbox .fit.ok{background:#e3f2e6;color:#2f7d4e}
  .goalbox .fit.early{background:#fff2e0;color:#c47a1e}
  .goalbox .fit.late{background:#eef0f3;color:#7a8088}
  .actinput{border:1.5px solid var(--carrot);border-radius:99px;padding:9px 14px;font-size:13px;outline:none;width:160px}
  .scale{display:flex;gap:6px}
  .seg{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:13px;padding:10px 2px;text-align:center;cursor:pointer;transition:.12s}
  .seg .sn{font-size:16px;font-weight:800;color:#c4c7cd}
  .seg .sl{font-size:9.5px;font-weight:700;color:var(--sub);margin-top:2px;line-height:1.1}
  .seg.on{border-color:transparent;color:#fff}
  .seg.on .sn,.seg.on .sl{color:#fff}
  textarea{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:12px;font-size:14px;font-family:inherit;resize:none;min-height:56px;outline:none;line-height:1.5}
  textarea:focus{border-color:var(--carrot)}
  .rsave{position:sticky;bottom:0;background:#fff;padding:12px 0 calc(8px + var(--safe-b));border-top:1px solid var(--line)}
  .rsavebtn{width:100%;border:none;background:var(--grad);color:#fff;padding:15px;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer}
  .rsavebtn:active{opacity:.9}
  /* katalk */
  .kbtn{width:100%;border:none;background:var(--leaf);color:#fff;padding:14px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer}
  .kbtn:active{filter:brightness(.95)}
  .kmsg{white-space:pre-wrap;background:#f0f7f2;border:1px solid #cfe6d8;border-radius:14px;padding:14px;font-size:13px;line-height:1.65;margin-top:11px;display:none}
  .krow{display:flex;gap:8px;margin-top:10px}
  .kcopy2{flex:1;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;font-weight:800;color:var(--sub)}
  .kcopy2.primary{background:var(--carrot);color:#fff;border-color:var(--carrot)}
  .kcopy2:active{filter:brightness(.96)}
  details{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:#fff;padding:0 15px}
  summary{cursor:pointer;padding:14px 0;font-size:13px;font-weight:700;color:var(--sub);list-style:none;display:flex;align-items:center}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"⌄";margin-left:auto;font-size:16px}
  details[open] summary::after{content:"⌃"}
  details ul{margin:0 0 14px;padding-left:18px}
  details li{font-size:13px;line-height:1.55;margin-bottom:5px}
  .infoitem{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f3f0ea}
  .infoitem span{flex:1;font-size:13px;line-height:1.5}
  .infodel{flex:none;border:none;background:#f3f0ea;color:#b5ab9c;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px}
  .infodel:active{background:#ffece9;color:var(--r5)}
  .infoadd{display:flex;gap:7px;margin:11px 0 14px}
  .infoinput{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;outline:none;font-family:inherit}
  .infoinput:focus{border-color:var(--carrot)}
  .infoaddbtn{flex:none;border:none;background:var(--carrot);color:#fff;border-radius:10px;padding:0 14px;font-size:12.5px;font-weight:800;cursor:pointer}
  .toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);background:#16181c;color:#fff;
    padding:11px 20px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;z-index:9999;background:#eceae5;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="max-width:340px;width:100%;background:#fff;border:1px solid #eee;border-radius:22px;padding:30px 24px;text-align:center;box-shadow:0 10px 40px #0001;font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif">
    <div style="font-size:40px">🥕</div>
    <div style="font-size:19px;font-weight:800;color:#ff7e36;margin-top:6px">당근 몬테소리지!</div>
    <div style="font-size:13px;color:#8e887d;margin-top:8px;line-height:1.5">선생님 전용입니다.<br>비밀번호를 입력해 주세요.</div>
    <input id="gpw" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="numeric" placeholder="비밀번호" style="width:100%;margin-top:18px;border:1.5px solid #eee;border-radius:12px;padding:13px;font-size:16px;text-align:center;outline:none;font-family:inherit">
    <button id="gbtn" style="width:100%;margin-top:10px;border:none;background:#ff7e36;color:#fff;padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit">들어가기</button>
    <div id="gerr" style="font-size:12px;color:#dc3023;margin-top:9px;height:14px;font-weight:700"></div>
  </div>
</div>
<script>
(function(){
  var PW="2026";
  var ok=sessionStorage.getItem('monte_gate_ok')==='1';
  function enter(){
    var v=(document.getElementById('gpw').value||'').replace(/\s/g,'').trim();
    if(v===PW){sessionStorage.setItem('monte_gate_ok','1');document.getElementById('gate').style.display='none';}

  const age=ageOf(s);

  if(age&&age<=3 || /분리 안|첫 등원|적응|돌아다/.test(txt))return 'chick';

  if(/충동|감정기복|기복|산만|짜증|싫어병/.test(txt) || s.risk>=5)return 'fox';

  if(/모범생|차분|아주 잘 따라|순하고 수용/.test(txt) || s.risk<=1)return 'rabbit';
  // 애교·웃음·말 많음 → 강아지
  if(/애교|웃음 많|말 (엄청|아주) 많|사랑 많|명랑/.test(txt))return 'puppy';
  // 고집·마이페이스·섬세 → 고양이
  if(/고집|마이페이스|섬세|예민|하고 싶은 것만/.test(txt))return 'cat';

}

const riskGrad=r=>{const c=riskColor(r);return `linear-gradient(135deg,${c},${shade(c,-18)})`;};
function shade(hex,p){const n=parseInt(hex.slice(1),16);let r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
const gv=n=>n.length>=3?n.slice(1):n;
// ── 축 값은 선생님 기록에서 계산 (흥미도=X, 성취도=Y). 기록 전엔 인수인계 추정값으로 옅게 표시 ──
function avg(a){return a.length?a.reduce((p,c)=>p+c,0)/a.length:0;}
// ── 신뢰도 가중 위치 ──
// 인수인계 추정값(seed)에서 시작 → 기록이 쌓일수록 실제 평균으로 "천천히" 수렴.
// K=기록이 seed와 같은 무게를 가지려면 필요한 건수. 클수록 더 천천히 움직임.
const K_INT=4, K_ACH=5;
// 인수인계 자료에서 "성취/발달 수준" 추정 (기록 전 세로 위치)
function seedAch(s){
  if(s.seedY)return s.seedY;
  const t=((s.dev||[]).join(' ')+' '+(s.tags||[]).join(' '));
  if(/엄-?청 느림|발화가 제대로|3색 구별.*어려|한글 못 읽|많이 늦|많이 느림/.test(t))return 1.6;
  if(/느린 편|느림|조금 많이 느림|약한 편|미숙|이제 시작|첫 등원|적응|분리 안/.test(t))return 2.3;
  if(/모범생|아주 잘 따라|평균 이상|빠른 편|영특|잘해냄|잘 따라오/.test(t))return 4;
  return 3;  // 보통
}
function metricsOf(s){
  const logs=LOG[s.id]||[];
  const seedX=s.joy;            // 흥미/편안 추정
  const seedY=seedAch(s);       // 성취 추정(자료 기반)
  const ints=logs.filter(e=>e.int).map(e=>e.int);
  const achs=logs.map(e=>e.ach);
  // 가중평균: (seed*K + 합) / (K + n)  → n이 작으면 seed에 가깝고, n이 크면 실제값에 수렴
  const x=(seedX*K_INT + ints.reduce((p,c)=>p+c,0))/(K_INT + ints.length);
  const y=(seedY*K_ACH + achs.reduce((p,c)=>p+c,0))/(K_ACH + achs.length);
  const n=logs.length;
  return {x:x, y:y, seeded:n===0, n:n, conf:Math.min(1, n/8)};  // conf: 8건이면 신뢰도 100%
}

// ── MAP (scatter) ──
function visibleStudents(){return S.filter(s=>filterDay==='전체'||s.time.startsWith(filterDay));}
function buildMap(){
  const plane=document.getElementById('mapPlane');
  const inner=document.getElementById('mapInner');
  inner.innerHTML='';
  const list=visibleStudents();
  const W=plane.clientWidth||360;
  const H=Math.max(380,Math.min(window.innerHeight-250,540)); plane.style.height=H+'px';
  const pad=54;
  // X=흥미(1..5)→좌우(오른=편안), Y=성취(1..5)→상하(위=잘익힘)
  const nodes=list.map((s,i)=>{
    const m=metricsOf(s);
    // 초기 좌표 + 작은 랜덤 지터(같은 좌표 무리 깨기)
    const jx=(Math.sin(i*12.9898)*43758.5)%1, jy=(Math.cos(i*78.233)*12543.3)%1;
    const x=pad+((m.x-1)/4)*(W-2*pad)+jx*10;
    const y=(H-pad)-((m.y-1)/4)*(H-2*pad)+jy*10;
    return {s,m,x,y};
  });
  // 겹침 분산 (강화: 반복↑, 간격↑)
  const minD=62;
  for(let it=0;it<260;it++){
    for(let a=0;a<nodes.length;a++)for(let b=a+1;b<nodes.length;b++){
      const dx=nodes[b].x-nodes[a].x, dy=nodes[b].y-nodes[a].y;
      let d=Math.hypot(dx,dy)||0.01;
      if(d<minD){const push=(minD-d)/2/d; nodes[a].x-=dx*push;nodes[a].y-=dy*push;nodes[b].x+=dx*push;nodes[b].y+=dy*push;}
    }
    nodes.forEach(n=>{n.x=Math.max(pad,Math.min(W-pad,n.x));n.y=Math.max(pad,Math.min(H-pad,n.y));});
  }
  // 1) 동그라미 아바타를 먼저 모두 배치
  nodes.forEach(n=>{
    const s=n.s, lv=careLvl(n.m), cnt=n.m.n;
    const op=(0.6+0.4*n.m.conf).toFixed(2);   // 기록 적으면 흐리게, 많을수록 또렷
    const sz=52+(lv-1)*3;n.sz=sz;
    const div=document.createElement('div');div.className='avatar';
    div.style.left=n.x+'px';div.style.top=n.y+'px';
    div.innerHTML=`<div class="ava-circle" style="width:${sz}px;height:${sz}px;background:#fff;border:3px solid ${careColor(lv)};opacity:${op};box-shadow:0 4px 12px ${careColor(lv)}55,0 2px 6px #0002">
      ${animalSVG(animalOf(s),careColor(lv),sz*0.86)}${cnt?`<span class="cnt">${cnt}</span>`:''}</div>`;
    div.onclick=(ev)=>{if(mapMoved){ev.preventDefault();ev.stopPropagation();return;}openDetail(s.id);};
    inner.appendChild(div);
  });
  // 2) 이름표는 항상 원 아래 같은 위치에 별도 레이어로 → 다른 아바타에 안 가림
  nodes.forEach(n=>{
    const lab=document.createElement('div');lab.className='ava-name';
    lab.textContent=n.s.name;
    lab.style.left=n.x+'px';lab.style.top=(n.y+n.sz/2+8)+'px';
    inner.appendChild(lab);
  });
  applyMapTransform();
}

// ── 맵 줌/팬 ──
let mapScale=1, mapTx=0, mapTy=0, mapMoved=false, mapPanInit=false;
function applyMapTransform(){const inner=document.getElementById('mapInner');if(inner)inner.style.transform=`translate(${mapTx}px,${mapTy}px) scale(${mapScale})`;}
function clampPan(){
  const plane=document.getElementById('mapPlane');if(!plane)return;
  const W=plane.clientWidth,H=plane.clientHeight;
  const minTx=W-W*mapScale, minTy=H-H*mapScale;
  mapTx=Math.max(minTx,Math.min(0,mapTx));mapTy=Math.max(minTy,Math.min(0,mapTy));
}
function zoomAt(cx,cy,factor){
  const ns=Math.max(1,Math.min(3.5,mapScale*factor));
  const k=ns/mapScale;
  mapTx=cx-(cx-mapTx)*k; mapTy=cy-(cy-mapTy)*k; mapScale=ns;
  clampPan();applyMapTransform();
}
function resetMapZoom(){mapScale=1;mapTx=0;mapTy=0;applyMapTransform();}
function initMapPanZoom(){
  if(mapPanInit)return; mapPanInit=true;
  const plane=document.getElementById('mapPlane');
  document.getElementById('zin').onclick=()=>zoomAt(plane.clientWidth/2,plane.clientHeight/2,1.4);
  document.getElementById('zout').onclick=()=>zoomAt(plane.clientWidth/2,plane.clientHeight/2,1/1.4);
  document.getElementById('zreset').onclick=resetMapZoom;
  // desktop wheel
  plane.addEventListener('wheel',e=>{e.preventDefault();const r=plane.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
  // desktop drag pan
  let dragging=false,sx=0,sy=0,btx=0,bty=0;
  plane.addEventListener('mousedown',e=>{if(e.target.closest('.avatar')||e.target.closest('.zoombtns'))return;dragging=true;mapMoved=false;sx=e.clientX;sy=e.clientY;btx=mapTx;bty=mapTy;});
  window.addEventListener('mousemove',e=>{if(!dragging)return;mapTx=btx+(e.clientX-sx);mapTy=bty+(e.clientY-sy);if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4)mapMoved=true;clampPan();applyMapTransform();});
  window.addEventListener('mouseup',()=>{dragging=false;setTimeout(()=>mapMoved=false,30);});
  // touch: 1=pan, 2=pinch
  let pinchD=0,pinchMid=null,tsx=0,tsy=0, btx2=0,bty2=0,touchPan=false;
  plane.addEventListener('touchstart',e=>{
    if(e.target.closest('.zoombtns'))return;
    if(e.touches.length===2){
      pinchD=tdist(e.touches);pinchMid=tmid(e.touches,plane);mapMoved=true;
    }else if(e.touches.length===1){
      touchPan=true;mapMoved=false;tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;btx2=mapTx;bty2=mapTy;
    }
  },{passive:true});
  plane.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinchD){
      e.preventDefault();
      const nd=tdist(e.touches),mid=tmid(e.touches,plane);
      zoomAt(mid.x,mid.y,nd/pinchD);pinchD=nd;mapMoved=true;
    }else if(e.touches.length===1&&touchPan&&mapScale>1){
      e.preventDefault();
      mapTx=btx2+(e.touches[0].clientX-tsx);mapTy=bty2+(e.touches[0].clientY-tsy);
      if(Math.abs(e.touches[0].clientX-tsx)+Math.abs(e.touches[0].clientY-tsy)>5)mapMoved=true;
      clampPan();applyMapTransform();
    }
  },{passive:false});
  plane.addEventListener('touchend',e=>{if(e.touches.length===0){touchPan=false;pinchD=0;setTimeout(()=>mapMoved=false,40);}});
}
function tdist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
function tmid(t,plane){const r=plane.getBoundingClientRect();return {x:(t[0].clientX+t[1].clientX)/2-r.left,y:(t[0].clientY+t[1].clientY)/2-r.top};}

function fbLabel(fb){
  if(!fb)return '-';

  const main=fb.split(/[\/→]/)[0].trim();

  return '첫 기록을 남겨주세요';

       <div id="noteChips">${NOTEGROUPS.map(g=>`<div class="notegrp"><div class="ngl ${g.tone}">${g.label}</div><div class="actwrap">${g.items.map(it=>`<div class="actpill notechip ${g.tone}" data-t="${it.c}">${it.c}</div>`).join('')}</div></div>`).join('')}</div>
       <textarea id="inNote" placeholder="고른 의견에 덧붙이거나, 직접 자세히 적어주세요"></textarea></div>
   </div>
   <div class="rsave"><div style="padding:0 18px"><button class="rsavebtn" onclick="saveEntry()">기록 저장하기</button></div></div>`;
  sh.classList.add('on');
  sh.querySelectorAll('#areaRow .areapill').forEach(c=>c.onclick=()=>{
    sh.querySelectorAll('#areaRow .areapill').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});
    const a=areaByKey[c.dataset.k];c.classList.add('on');c.style.background=a.color;c.style.color='#fff';
    draft.area=c.dataset.k;draft.act='';draft.step='';buildActs(c.dataset.k);
    document.getElementById('stepStep').style.display='none';
    document.getElementById('nextWrap').innerHTML='';
  });
  sh.querySelectorAll('#achScale .seg').forEach(c=>c.onclick=()=>segPick('achScale',c,'ach'));
  sh.querySelectorAll('#intScale .seg').forEach(c=>c.onclick=()=>segPick('intScale',c,'int'));
  // 교사 의견 칩: 다중 선택 → 메모에 누적 (+톤 기록)
  draft.notes=[];draft.noteTones=[];
  sh.querySelectorAll('#noteChips .notechip').forEach(c=>c.onclick=()=>{
    c.classList.toggle('on');const t=c.dataset.t;const i=draft.notes.indexOf(t);
    const tone=c.classList.contains('pos')?'pos':c.classList.contains('neg')?'neg':'mid';
    if(i<0){draft.notes.push(t);draft.noteTones.push(tone);}
    else{draft.notes.splice(i,1);draft.noteTones.splice(i,1);}
  });
}
function segPick(scaleId,c,key){
  const sh=document.getElementById('rsheet');
  sh.querySelectorAll('#'+scaleId+' .seg').forEach(x=>{x.classList.remove('on');x.style.background='';});
  c.classList.add('on');c.style.background=c.dataset.c;draft[key]=+c.dataset.v;
}
// 2단계: 활동
function buildActs(key){
  const step=document.getElementById('actStep'),box=document.getElementById('actWrap');
  step.style.display='block';
  box.innerHTML=actNames(key).map(a=>`<div class="actpill" data-a="${a}">${a}</div>`).join('')+`<div class="actadd" id="actAdd">＋ 직접</div>`;
  box.querySelectorAll('.actpill').forEach(c=>c.onclick=()=>{
    box.querySelectorAll('.actpill').forEach(x=>x.classList.remove('on'));c.classList.add('on');
    draft.act=c.dataset.a;draft.step='';buildSteps(key,c.dataset.a);showGoal(key,c.dataset.a);
  });
  document.getElementById('actAdd').onclick=function(){
    const inp=document.createElement('input');inp.className='actinput';inp.placeholder='활동명 후 Enter';
    this.replaceWith(inp);inp.focus();
    inp.onkeydown=ev=>{if(ev.key==='Enter'&&inp.value.trim()){const v=inp.value.trim();
      box.querySelectorAll('.actpill').forEach(x=>x.classList.remove('on'));
      const chip=document.createElement('div');chip.className='actpill on';chip.dataset.a=v;chip.textContent=v;
      inp.replaceWith(chip);draft.act=v;draft.step='';
      document.getElementById('stepStep').style.display='none';
      chip.onclick=()=>{box.querySelectorAll('.actpill').forEach(x=>x.classList.remove('on'));chip.classList.add('on');draft.act=v;};
    }};
  };
}
// 3단계: 세부 단계
function buildSteps(key,actName){
  const wrapStep=document.getElementById('stepStep'),box=document.getElementById('stepWrap');
  const steps=stepsOf(key,actName);
  if(!steps.length){wrapStep.style.display='none';draft.step='';buildNextSuggest();return;}
  wrapStep.style.display='block';
  box.innerHTML=steps.map(s=>`<div class="actpill" data-s="${s}">${s}</div>`).join('');
  box.querySelectorAll('.actpill').forEach((c,i)=>c.onclick=()=>{
    box.querySelectorAll('.actpill').forEach(x=>x.classList.remove('on'));c.classList.add('on');
    draft.step=c.dataset.s;draft._stepIdx=i;buildNextSuggest();
  });
  buildNextSuggest();
}
// 다음 차시 추천: 같은 활동의 다음 단계를 자동 제안
function buildNextSuggest(){
  const box=document.getElementById('nextWrap');if(!box)return;
  const steps=stepsOf(draft.area,draft.act);
  let sug=[];
  if(steps.length&&draft.step){
    const i=steps.indexOf(draft.step);
    if(i>=0&&i<steps.length-1)sug.push(steps[i+1]+' 진행');
    sug.push(draft.act+' 복습');
  }else if(steps.length){sug.push(steps[0]+' 시작');}
  box.innerHTML=sug.map(s=>`<div class="actpill suggest" data-x="${s}">＋ ${s}</div>`).join('');
  box.querySelectorAll('.actpill').forEach(c=>c.onclick=()=>{document.getElementById('inNext').value=c.dataset.x;});
}
// 활동의 교육 목표 + 연령 적합 표시
function showGoal(key,actName){
  const g=document.getElementById('goalBox');const a=actObj(key,actName);if(!g||!a)return;
  const childAge=ageOf(byId[cur]||{});
  let fit='';
  if(a.age&&childAge){
    if(childAge<a.age[0])fit=`<span class="fit early">조금 이른 단계 (권장 ${a.age[0]}~${a.age[1]}세)</span>`;
    else if(childAge>a.age[1])fit=`<span class="fit late">이미 충분한 연령 (권장 ${a.age[0]}~${a.age[1]}세)</span>`;
    else fit=`<span class="fit ok">${childAge}세에 딱 맞아요 (권장 ${a.age[0]}~${a.age[1]}세)</span>`;
  }else if(a.age){fit=`<span class="fit">권장 ${a.age[0]}~${a.age[1]}세</span>`;}
  g.style.display='block';
  g.innerHTML=`<div class="goaltxt">🎯 ${a.goal}</div>${fit}`;
}
function closeRecord(){document.getElementById('rsheet').classList.remove('on');}
function saveEntry(){
  if(!draft.area)return toast('영역을 선택해 주세요');
  if(!draft.act)return toast('활동을 선택해 주세요');
  if(!draft.ach)return toast('성취도를 선택해 주세요');
  const chipNotes=(draft.notes||[]).join(', ');
  const freeNote=document.getElementById('inNote').value.trim();
  const note=[chipNotes,freeNote].filter(Boolean).join(freeNote&&chipNotes?' / ':'');
  const tones=draft.noteTones||[];
  const noteTone=tones.includes('neg')?'neg':(tones.includes('pos')?'pos':'mid');
  const e={ts:Date.now(),date:todayStr(),area:draft.area,act:draft.act,step:draft.step||'',ach:draft.ach,int:draft.int||0,
    notes:(draft.notes||[]).slice(),noteTone:noteTone,free:freeNote,next:document.getElementById('inNext').value.trim(),note:note};
  (LOG[cur]=LOG[cur]||[]).push(e);persist();
  closeRecord();renderProg();renderFeed();
  const c=document.getElementById('cntFeed');if(c)c.textContent=LOG[cur].length;
  toast('✓ 저장됐어요');
}
function todayStr(){const d=new Date();return `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function escapeHtml(t){return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])).replace(/\n/g,'<br>');}

// ── katalk ──
let lastMsg='';

 일상:'집에서도 수저 놓기, 물 따르기 같은 작은 심부름을 맡겨주시면 자립심이 쑥쑥 자라요 🏠',

 언어:'잠들기 전 그림책을 함께 읽고 "이건 무슨 소리로 시작할까?" 물어봐 주세요 📚',

 예술:'아이의 그림이나 작품을 "무엇을 그렸어?"라고 물으며 충분히 칭찬해 주세요 🎨',

};
// 성취도/흥미도: 단계별로 여러 버전 → 매번 다르게
const ACHLINE={
 1:['오늘 처음으로 이 활동을 만나 찬찬히 살펴보는 시간을 가졌어요.','새로운 교구를 처음 소개받고 호기심 어린 눈으로 관찰했어요.','오늘 처음 만나본 활동이라, 어떤 건지 함께 탐색해 봤답니다.'],

 1:['아직은 조금 낯설어했지만, 선생님과 함께 천천히 다가가 봤어요.','오늘은 마음의 준비가 더 필요했지만 곁에서 차분히 도와줬어요.','조금 망설였지만 선생님과 함께 한 걸음씩 시작해 봤답니다.'],
 2:['처음엔 소극적이었지만 점점 마음을 열어가고 있어요.','살짝 머뭇거렸지만 시간이 지나며 관심을 보였어요.','조심스러웠지만 조금씩 흥미를 붙여가는 모습이었어요.'],

};
const GREET=['안녕하세요, 학부모님 😊','학부모님, 안녕하세요! 😊','반갑습니다, 학부모님 🙂','학부모님께 오늘 수업 소식 전해드려요 😊'];
const CLOSE_FACE=['더 자세한 이야기는 다음에 오실 때 대면으로 나눠요 🙌','다음에 오시면 오늘 모습 더 자세히 들려드릴게요 🙌','자세한 내용은 다음 만남 때 직접 말씀드릴게요 🙌'];
const CLOSE_DEF=['궁금하신 점은 언제든 편하게 말씀 주세요 🙌','더 궁금한 점 있으시면 편히 연락 주세요 🙌','언제든 편하게 물어봐 주세요 🙌'];
const ENDING=['오늘도 OO(이)와 행복한 시간이었습니다. 감사합니다! 💛','오늘도 OO(이)와 즐겁게 보냈어요. 감사합니다! 💛','OO(이)의 성장을 함께해 기뻐요. 감사합니다! 💛','오늘도 따뜻한 하루였어요. 늘 감사합니다! 💛'];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function genMsg(){
  if(!cur)return;const s=byId[cur];const r=(LOG[cur]||[]).slice().sort((a,b)=>b.ts-a.ts)[0];
  const m=document.getElementById('kmsg');
  if(!r){m.textContent='아직 기록된 수업이 없어요. 먼저 오늘 수업을 기록해 주세요 🙂';m.style.display='block';const kr=document.getElementById('krow');if(kr)kr.style.display='none';return;}
  const a=areaByKey[r.area]||{name:r.area};
  const actInfo=actObj(r.area,r.act);
  const what=r.step?`${r.act} 중 「${r.step}」`:`「${r.act}」`;
  const nm=gv(s.name);
  // 같은 활동의 과거 기록과 비교 → 성장 서술
  const past=(LOG[cur]||[]).filter(e=>e.ts!==r.ts&&e.act===r.act).sort((x,y)=>y.ts-x.ts)[0];
  let growth='';
  if(past&&r.ach>past.ach){growth=`지난번 「${r.act}」보다 한 단계 더 성장했어요. 정말 대단하죠? 📈`;}
  else if(past&&r.step&&past.step&&r.step!==past.step){growth=`지난번엔 「${past.step}」였는데, 오늘은 「${r.step}」까지 나아갔어요! 📈`;}
  let L=[];
  L.push(`🥕 [${s.name}] ${a.name} 수업 소식이에요!`);
  L.push(pick(GREET));
  L.push(``);
  L.push(`📌 오늘의 활동`);
  L.push(`· ${a.name} 영역 — ${what}`);
  if(actInfo&&actInfo.goal)L.push(`· 이런 걸 길러요 → ${actInfo.goal} 🌱`);
  L.push(``);
  L.push(`🌟 ${nm}(이)의 오늘 모습`);
  L.push(pick(ACHLINE[r.ach]));
  if(r.int)L.push(pick(INTLINE[r.int]));
  if(growth)L.push(growth);
  // 선생님 한마디: 고른 칩마다 변주 문장 풀에서 랜덤 → 매번 다르게
  const chips=(r.notes&&r.notes.length)?r.notes:[];
  const sentences=chips.map(c=>{const nv=NOTEVAR[c];return nv?pick(nv.v):c;});
  if(r.free)sentences.push(r.free);            // 선생님이 직접 쓴 자유 의견
  else if(!chips.length&&r.note)sentences.push(r.note);
  if(sentences.length){
    L.push('');L.push(`💬 선생님 한마디`);
    const tail={pos:pick(['그런 모습이 참 예뻤어요. 😊','정말 기특했답니다. 😊','보는 저도 흐뭇했어요. 🥰','오늘도 한 뼘 자랐어요. 🌱']),
                mid:pick(['오늘도 꾸준히 잘 해줬어요. 😊','늘 한결같아 든든해요.','차곡차곡 잘 쌓아가고 있어요. 🌱']),
                neg:pick(['다음 시간엔 더 잘할 수 있도록 곁에서 도와줄게요. 💪','조금씩 나아지고 있으니 걱정 마세요. 😊','함께 천천히 연습해 갈게요. 💪'])}[r.noteTone||'pos'];
    L.push(`${nm}(이), ${sentences.join(' 또 ')} ${tail}`);
  }
  L.push(``);
  L.push(`📊 오늘의 성장`);
  L.push(`· 성취도 ${pipBar(r.ach)} ${ACH[r.ach-1].t}`);
  if(r.int)L.push(`· 흥미도 ${pipBar(r.int)} ${INT[r.int-1].t}`);
  if(r.next){L.push(``);L.push(`👉 다음 시간에는`);L.push(`· ${r.next} 을(를) 함께 해볼 예정이에요!`);}
  if(HOMETIP[r.area]){L.push(``);L.push(`🏡 가정에서는`);L.push(HOMETIP[r.area]);}
  L.push(``);
  L.push((s.tags||[]).includes('대면 피드백')?pick(CLOSE_FACE):pick(CLOSE_DEF));
  L.push(pick(ENDING).replace(/OO/g,nm));
  lastMsg=L.join('\n');
  m.textContent=lastMsg;m.style.display='block';const kr=document.getElementById('krow');if(kr)kr.style.display='flex';
}
function pipBar(n){return '●'.repeat(n)+'○'.repeat(5-n);}
function softenNote(t){ // "오늘 집중을 잘했어요" → "오늘 집중을 잘했고"
  return t.replace(/했어요/g,'했고').replace(/했어요\b/g,'했고').replace(/돼요/g,'되었고').replace(/\/$/,'').replace(/, /g,', ');
}
function copyMsg(){navigator.clipboard&&navigator.clipboard.writeText(lastMsg);toast('📋 복사됐어요');}
